<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Library Login</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#2e7d32;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{
background:white;
padding:40px;
border-radius:8px;
width:320px;
text-align:center;
box-shadow:0 0 10px rgba(0,0,0,0.3);
}

.login-box h2{
margin-bottom:20px;
color:#2e7d32;
}

input{
width:100%;
padding:10px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:4px;
}

button{
width:100%;
padding:10px;
background:#2e7d32;
color:white;
border:none;
cursor:pointer;
border-radius:4px;
font-size:16px;
}

button:hover{
background:#1b5e20;
}

.error{
color:red;
font-size:14px;
display:none;
}

</style>
</head>

<body>

<div class="login-box">

<h2>Library System Login</h2>

<input type="text" id="username" placeholder="Username">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

<p class="error" id="errorMsg">Invalid username or password</p>

</div>

<script>

function login(){

let user=document.getElementById("username").value;
let pass=document.getElementById("password").value;

/* CHANGE USERNAME AND PASSWORD HERE */

if(user==="admin" && pass==="library123"){

window.location.href="accession.html";

}else{

document.getElementById("errorMsg").style.display="block";

}

}

</script>

</body>
</html>
